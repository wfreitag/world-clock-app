name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
          - os: ubuntu-22.04
            label: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build & attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'World Clock ${{ inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          releaseBody: |
            ## World Clock ${{ inputs.tag || github.ref_name }}

            Download the asset for your platform below.

            - **macOS** — `.dmg` installer or `.app.tar.gz` bundle
            - **Windows** — `.msi` or NSIS `.exe` installer
            - **Linux** — `.deb` package or `.AppImage`

            > ⚠️ Builds are **not code-signed**.
            > - macOS: right-click → Open the first time, or System Settings → Privacy & Security → Open Anyway.
            > - Windows: SmartScreen will warn — click "More info" → "Run anyway".
